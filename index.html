<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Study Behavior System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      background: #f5f6f8;
      color: #222;
    }

    h1 {
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 16px;
    }

    .card {
      background: white;
      padding: 22px;
      margin: 16px 0;
      border-radius: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .focus-card {
      border: 2px solid #222;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .progress {
      height: 18px;
      background: #ddd;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    .task-row input[type="checkbox"] {
      transform: scale(1.2);
    }

    .task-row span {
      flex: 1;
      line-height: 1.5;
    }

    .done {
      text-decoration: line-through;
      color: #777;
    }

    input[type="text"], select, textarea {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="text"] {
      width: 55%;
    }

    textarea {
      width: 100%;
      height: 90px;
      margin-top: 10px;
    }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #b00020;
    }

    button.small {
      padding: 5px 9px;
      font-size: 12px;
    }

    details {
      margin: 16px 0;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
      font-size: 19px;
      padding: 8px 0;
    }

    .small {
      color: #666;
      font-size: 14px;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 22px);
      gap: 7px;
      margin-top: 12px;
    }

    .day-box {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: #ddd;
      border: 1px solid #ccc;
      position: relative;
    }

    .day-box.active {
      background: #4caf50;
      border-color: #4caf50;
    }

    .day-box.today {
      outline: 2px solid #222;
    }

    .day-box:hover::after {
      content: attr(data-date);
      position: absolute;
      left: 0;
      top: 28px;
      background: #222;
      color: white;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 6px;
      white-space: nowrap;
      z-index: 10;
    }

    .history-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .history-date {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .empty {
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      input[type="text"] {
        width: 100%;
        margin-bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <h1>🎮 Study Behavior System</h1>
  <p class="subtitle">今天只看今天要做什么；长期进度用小方格可视化。</p>

  <div class="top-grid">
    <div class="card">
      <h2>📊 今日状态</h2>
      <p>今日完成率：<strong><span id="todayPercent">0%</span></strong></p>
      <div class="progress">
        <div class="bar" id="todayBar"></div>
      </div>
      <p>今日 XP：<strong><span id="todayXp">0</span></strong></p>
      <p class="small">规则：完成 Today 任务后，今天的小方格会被点亮。</p>
    </div>

    <div class="card">
      <h2>🧩 周 / 月进度打卡</h2>
      <p class="small">绿色 = 当天 Today 任务全部完成</p>
      <div class="heatmap" id="heatmap"></div>
    </div>
  </div>

  <div class="card focus-card">
    <h2>🔥 Today 任务</h2>
    <div>
      <input id="todayInput" type="text" placeholder="输入今天要完成的任务，例如：5318 Week5 复习" />
      <select id="todayXpSelect">
        <option value="10">10 XP</option>
        <option value="20">20 XP</option>
        <option value="30">30 XP</option>
      </select>
      <button onclick="addTask('today')">添加</button>
    </div>
    <div id="todayList"></div>
  </div>

  <div class="card">
    <details open>
      <summary>🎯 本周任务</summary>
      <div>
        <input id="weeklyInput" type="text" placeholder="添加本周任务" />
        <select id="weeklyXpSelect">
          <option value="10">10 XP</option>
          <option value="20">20 XP</option>
          <option value="30">30 XP</option>
        </select>
        <button onclick="addTask('weekly')">添加</button>
      </div>
      <div id="weeklyList"></div>
    </details>

    <details>
      <summary>📘 5318</summary>
      <div>
        <input id="5318Input" type="text" placeholder="添加 5318 任务" />
        <select id="5318XpSelect">
          <option value="10">10 XP</option>
          <option value="20">20 XP</option>
          <option value="30">30 XP</option>
        </select>
        <button onclick="addTask('5318')">添加</button>
      </div>
      <div id="5318List"></div>
    </details>

    <details>
      <summary>📗 5046</summary>
      <div>
        <input id="5046Input" type="text" placeholder="添加 5046 任务" />
        <select id="5046XpSelect">
          <option value="10">10 XP</option>
          <option value="20">20 XP</option>
          <option value="30">30 XP</option>
        </select>
        <button onclick="addTask('5046')">添加</button>
      </div>
      <div id="5046List"></div>
    </details>

    <details>
      <summary>🔐 5995</summary>
      <div>
        <input id="5995Input" type="text" placeholder="添加 5995 任务" />
        <select id="5995XpSelect">
          <option value="10">10 XP</option>
          <option value="20">20 XP</option>
          <option value="30">30 XP</option>
        </select>
        <button onclick="addTask('5995')">添加</button>
      </div>
      <div id="5995List"></div>
    </details>

    <details>
      <summary>☁️ 5439</summary>
      <div>
        <input id="5439Input" type="text" placeholder="添加 5439 任务" />
        <select id="5439XpSelect">
          <option value="10">10 XP</option>
          <option value="20">20 XP</option>
          <option value="30">30 XP</option>
        </select>
        <button onclick="addTask('5439')">添加</button>
      </div>
      <div id="5439List"></div>
    </details>
  </div>

  <div class="card">
    <h2>🧠 今日总结</h2>
    <textarea id="summary" placeholder="今天完成了什么？卡在哪里？明天第一步做什么？"></textarea>
    <br />
    <button onclick="saveSummary()">保存总结</button>
    <button class="secondary" onclick="saveTodayToHistory()">保存今日记录</button>
    <button class="danger" onclick="resetToday()">重置 Today</button>
  </div>

  <div class="card">
    <details>
      <summary>📜 历史记录</summary>
      <div id="historyList"></div>
    </details>
  </div>

  <script>
    const categories = ["today", "weekly", "5318", "5046", "5995", "5439"];

    const defaultTasks = {
      today: [
        { text: "5046 A2 收尾", xp: 30, done: false },
        { text: "5318 A2 理解结构", xp: 30, done: false },
        { text: "5318 Week5 复习", xp: 20, done: false }
      ],
      weekly: [
        { text: "5046 A2 完成", xp: 30, done: false },
        { text: "5439 Lab 1 完成", xp: 30, done: false },
        { text: "5439 Lab 2 完成", xp: 30, done: false },
        { text: "5318 A2 理解结构 + 初步完成", xp: 30, done: false }
      ],
      "5318": [
        { text: "5318 Week5", xp: 20, done: false },
        { text: "5318 Week6", xp: 20, done: false },
        { text: "5318 Week7", xp: 20, done: false },
        { text: "5318 Week8", xp: 20, done: false },
        { text: "5318 Week9", xp: 20, done: false }
      ],
      "5046": [],
      "5995": [],
      "5439": [
        { text: "5439 Lab W5", xp: 30, done: false },
        { text: "5439 Lab W7", xp: 30, done: false },
        { text: "5439 Lab W8", xp: 30, done: false }
      ]
    };

    let data = loadData();

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadData() {
      const saved = localStorage.getItem("study-system-data");
      if (saved) return JSON.parse(saved);

      return {
        tasks: defaultTasks,
        summaries: {},
        history: {},
        completedDays: {}
      };
    }

    function saveData() {
      localStorage.setItem("study-system-data", JSON.stringify(data));
      renderAll();
    }

    function renderAll() {
      categories.forEach(renderCategory);
      renderTodayStatus();
      renderHeatmap();
      renderHistory();
      document.getElementById("summary").value = data.summaries[todayKey()] || "";
    }

    function renderCategory(category) {
      const list = document.getElementById(category + "List");
      if (!list) return;

      list.innerHTML = "";

      if (!data.tasks[category]) data.tasks[category] = [];

      if (data.tasks[category].length === 0) {
        list.innerHTML = `<p class="empty">暂无任务，可以在上方添加。</p>`;
        return;
      }

      data.tasks[category].forEach((task, index) => {
        const row = document.createElement("div");
        row.className = "task-row";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.onchange = () => {
          task.done = checkbox.checked;
          updateTodayCompletion();
          saveData();
        };

        const span = document.createElement("span");
        span.textContent = `${task.text}（${task.xp} XP）`;
        if (task.done) span.classList.add("done");

        const del = document.createElement("button");
        del.textContent = "删除";
        del.className = "small danger";
        del.onclick = () => {
          data.tasks[category].splice(index, 1);
          updateTodayCompletion();
          saveData();
        };

        row.appendChild(checkbox);
        row.appendChild(span);
        row.appendChild(del);
        list.appendChild(row);
      });
    }

    function addTask(category) {
      const input = document.getElementById(category + "Input");
      const xpSelect = document.getElementById(category + "XpSelect");

      const text = input.value.trim();
      const xp = Number(xpSelect.value);

      if (!text) return;

      data.tasks[category].push({
        text,
        xp,
        done: false
      });

      input.value = "";
      updateTodayCompletion();
      saveData();
    }

    function renderTodayStatus() {
      const todayTasks = data.tasks.today || [];
      const total = todayTasks.length;
      const done = todayTasks.filter(t => t.done).length;
      const xp = todayTasks.filter(t => t.done).reduce((sum, t) => sum + Number(t.xp), 0);
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);

      document.getElementById("todayPercent").textContent = percent + "%";
      document.getElementById("todayBar").style.width = percent + "%";
      document.getElementById("todayXp").textContent = xp;
    }

    function updateTodayCompletion() {
      const todayTasks = data.tasks.today || [];
      const allDone = todayTasks.length > 0 && todayTasks.every(t => t.done);
      data.completedDays[todayKey()] = allDone;
    }

    function renderHeatmap() {
      const heatmap = document.getElementById("heatmap");
      heatmap.innerHTML = "";

      const today = new Date();

      for (let i = 27; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);

        const key = date.toISOString().slice(0, 10);
        const box = document.createElement("div");

        box.className = "day-box";
        box.dataset.date = key;

        if (data.completedDays[key]) box.classList.add("active");
        if (key === todayKey()) box.classList.add("today");

        heatmap.appendChild(box);
      }
    }

    function saveSummary() {
      data.summaries[todayKey()] = document.getElementById("summary").value;
      saveData();
    }

    function saveTodayToHistory() {
      saveSummary();

      const completed = (data.tasks.today || [])
        .filter(t => t.done)
        .map(t => `${t.text}（${t.xp} XP）`);

      data.history[todayKey()] = {
        completed,
        summary: data.summaries[todayKey()] || ""
      };

      alert("今日记录已保存到历史记录。");
      saveData();
    }

    function renderHistory() {
      const historyList = document.getElementById("historyList");
      const entries = Object.entries(data.history).sort((a, b) => b[0].localeCompare(a[0]));

      if (entries.length === 0) {
        historyList.innerHTML = `<p class="empty">还没有历史记录。完成一天后点击“保存今日记录”。</p>`;
        return;
      }

      historyList.innerHTML = "";

      entries.forEach(([date, record]) => {
        const div = document.createElement("div");
        div.className = "history-item";

        const completedText = record.completed.length
          ? record.completed.map(item => `<li>${item}</li>`).join("")
          : "<li>当天没有已完成任务</li>";

        div.innerHTML = `
          <div class="history-date">${date}</div>
          <div><strong>完成内容：</strong></div>
          <ul>${completedText}</ul>
          <div><strong>总结：</strong>${record.summary || "无"}</div>
        `;

        historyList.appendChild(div);
      });
    }

    function resetToday() {
      const ok = confirm("确定要重置 Today 任务和今日总结吗？");
      if (!ok) return;

      data.tasks.today.forEach(t => t.done = false);
      data.summaries[todayKey()] = "";
      data.completedDays[todayKey()] = false;

      saveData();
    }

    renderAll();
  </script>
</body>
</html>
