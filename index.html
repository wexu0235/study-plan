<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Study Behavior System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      background: #f5f6f8;
      color: #222;
    }

    h1 { margin-bottom: 6px; }
    .subtitle { color: #666; margin-bottom: 24px; }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 16px;
    }

    .card {
      background: white;
      padding: 22px;
      margin: 16px 0;
      border-radius: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .focus-card { border: 2px solid #222; }

    h2 { margin-top: 0; }

    .progress {
      height: 18px;
      background: #ddd;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s;
    }

    input[type="text"], select, textarea {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="text"] { width: 60%; }

    textarea {
      width: 100%;
      height: 90px;
      margin-top: 10px;
    }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 14px;
      margin-left: 4px;
    }

    button.danger { background: #b00020; }
    button.small {
      padding: 5px 9px;
      font-size: 12px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    .task-row input[type="checkbox"] {
      transform: scale(1.2);
    }

    .task-row span {
      flex: 1;
      line-height: 1.5;
    }

    .done {
      text-decoration: line-through;
      color: #777;
    }

    details { margin: 16px 0; }

    summary {
      cursor: pointer;
      font-weight: bold;
      font-size: 19px;
      padding: 8px 0;
    }

    .small, .empty {
      color: #666;
      font-size: 14px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 30px);
      gap: 7px;
      margin-top: 12px;
      align-items: center;
    }

    .weekday {
      font-size: 13px;
      color: #666;
      text-align: center;
      font-weight: bold;
    }

    .day-box {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #ddd;
      border: 1px solid #ccc;
      text-align: center;
      line-height: 30px;
      font-size: 13px;
      color: #555;
    }

    .day-box.empty-day {
      background: transparent;
      border: none;
    }

    .day-box.active {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
      font-weight: bold;
    }

    .day-box.today {
      outline: 2px solid #222;
      outline-offset: 2px;
    }

    .history-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .history-date {
      font-weight: bold;
      margin-bottom: 6px;
    }

    @media (max-width: 850px) {
      .top-grid { grid-template-columns: 1fr; }
      input[type="text"] {
        width: 100%;
        margin-bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <h1>🎮 Study Behavior System</h1>
  <p class="subtitle">Today 任务全部完成后，自动点亮今天的进度格。所有内容会自动保存。</p>

  <div class="top-grid">
    <div class="card">
      <h2>📊 今日状态</h2>
      <p>Today 完成率：<strong><span id="todayPercent">0%</span></strong></p>
      <div class="progress">
        <div class="bar" id="todayBar"></div>
      </div>
      <p class="small">规则：Today 任务全部完成 = 今日打卡成功</p>
    </div>

    <div class="card">
      <h2 id="monthTitle">🧩 月进度打卡</h2>
      <p class="small">绿色 = 当天 Today 任务全部完成</p>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="card focus-card">
    <h2>🔥 Today 任务</h2>
    <input id="todayInput" type="text" placeholder="添加今天要完成的任务" />
    <button onclick="addTask('today')">添加</button>

    <br /><br />

    <select id="importSelect"></select>
    <button onclick="importWeeklyTask()">从本周任务导入</button>

    <div id="todayList"></div>
  </div>

  <div class="card">
    <details open>
      <summary>🎯 本周任务</summary>
      <input id="weeklyInput" type="text" placeholder="添加本周任务" />
      <button onclick="addTask('weekly')">添加</button>
      <div id="weeklyList"></div>
    </details>

    <details>
      <summary>📘 5318</summary>
      <input id="5318Input" type="text" placeholder="添加 5318 任务" />
      <button onclick="addTask('5318')">添加</button>
      <div id="5318List"></div>
    </details>

    <details>
      <summary>📗 5046</summary>
      <input id="5046Input" type="text" placeholder="添加 5046 任务" />
      <button onclick="addTask('5046')">添加</button>
      <div id="5046List"></div>
    </details>

    <details>
      <summary>🔐 5995</summary>
      <input id="5995Input" type="text" placeholder="添加 5995 任务" />
      <button onclick="addTask('5995')">添加</button>
      <div id="5995List"></div>
    </details>

    <details>
      <summary>☁️ 5439</summary>
      <input id="5439Input" type="text" placeholder="添加 5439 任务" />
      <button onclick="addTask('5439')">添加</button>
      <div id="5439List"></div>
    </details>
  </div>

  <div class="card">
    <h2>🧠 今日总结</h2>
    <textarea id="summary" placeholder="今天完成了什么？卡在哪里？明天第一步做什么？"></textarea>
    <br />
    <button class="danger" onclick="resetToday()">重置 Today</button>
  </div>

  <div class="card">
    <details>
      <summary>📜 历史记录</summary>
      <div id="historyList"></div>
    </details>
  </div>

  <script>
    const STORAGE_KEY = "study-system-data-empty-v1";
    const categories = ["today", "weekly", "5318", "5046", "5995", "5439"];

    let data = loadData();

    function emptyData() {
      return {
        tasks: {
          today: [],
          weekly: [],
          "5318": [],
          "5046": [],
          "5995": [],
          "5439": []
        },
        summaries: {},
        history: {},
        completedDays: {}
      };
    }

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
      return emptyData();
    }

    function saveData() {
      updateTodayCompletion();
      autoSaveTodayRecord();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderAll();
    }

    function todayKey() {
      return formatDate(new Date());
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function normalize(text) {
      return text.trim().toLowerCase();
    }

    function syncSameTasks(text, done) {
      const target = normalize(text);

      categories.forEach(category => {
        data.tasks[category].forEach(task => {
          if (normalize(task.text) === target) {
            task.done = done;
          }
        });
      });
    }

    function addTask(category) {
      const input = document.getElementById(category + "Input");
      const text = input.value.trim();
      if (!text) return;

      data.tasks[category].push({ text, done: false });
      input.value = "";
      saveData();
    }

    function importWeeklyTask() {
      const select = document.getElementById("importSelect");
      const text = select.value;
      if (!text) return;

      const exists = data.tasks.today.some(task => normalize(task.text) === normalize(text));
      if (exists) {
        alert("这个任务已经在 Today 任务中了。");
        return;
      }

      const weeklyTask = data.tasks.weekly.find(task => task.text === text);
      if (!weeklyTask) return;

      data.tasks.today.push({
        text: weeklyTask.text,
        done: weeklyTask.done
      });

      saveData();
    }

    function renderAll() {
      categories.forEach(renderCategory);
      renderImportSelect();
      renderTodayStatus();
      renderCalendar();
      renderHistory();

      const summary = document.getElementById("summary");
      if (summary.value !== (data.summaries[todayKey()] || "")) {
        summary.value = data.summaries[todayKey()] || "";
      }
    }

    function renderCategory(category) {
      const list = document.getElementById(category + "List");
      list.innerHTML = "";

      if (data.tasks[category].length === 0) {
        list.innerHTML = `<p class="empty">暂无任务，可以在上方添加。</p>`;
        return;
      }

      data.tasks[category].forEach((task, index) => {
        const row = document.createElement("div");
        row.className = "task-row";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;

        checkbox.onchange = () => {
          task.done = checkbox.checked;
          syncSameTasks(task.text, task.done);
          saveData();
        };

        const span = document.createElement("span");
        span.textContent = task.text;
        if (task.done) span.classList.add("done");

        const del = document.createElement("button");
        del.textContent = "删除";
        del.className = "small danger";
        del.onclick = () => {
          data.tasks[category].splice(index, 1);
          saveData();
        };

        row.appendChild(checkbox);
        row.appendChild(span);
        row.appendChild(del);
        list.appendChild(row);
      });
    }

    function renderImportSelect() {
      const select = document.getElementById("importSelect");
      select.innerHTML = "";

      if (data.tasks.weekly.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "本周任务为空";
        select.appendChild(option);
        return;
      }

      data.tasks.weekly.forEach(task => {
        const option = document.createElement("option");
        option.value = task.text;
        option.textContent = task.text;
        select.appendChild(option);
      });
    }

    function renderTodayStatus() {
      const todayTasks = data.tasks.today;
      const total = todayTasks.length;
      const done = todayTasks.filter(t => t.done).length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);

      document.getElementById("todayPercent").textContent = percent + "%";
      document.getElementById("todayBar").style.width = percent + "%";
    }

    function updateTodayCompletion() {
      const todayTasks = data.tasks.today;
      const allDone = todayTasks.length > 0 && todayTasks.every(t => t.done);
      data.completedDays[todayKey()] = allDone;
    }

    function autoSaveTodayRecord() {
      const key = todayKey();
      const completed = data.tasks.today.filter(t => t.done).map(t => t.text);

      data.history[key] = {
        completed,
        summary: data.summaries[key] || "",
        completedAllToday: data.completedDays[key] || false
      };
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();

      document.getElementById("monthTitle").textContent = `🧩 ${month + 1}月进度打卡`;

      const weekdays = ["一", "二", "三", "四", "五", "六", "日"];
      weekdays.forEach(day => {
        const div = document.createElement("div");
        div.className = "weekday";
        div.textContent = day;
        grid.appendChild(div);
      });

      const firstDay = new Date(year, month, 1);
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let startWeekday = firstDay.getDay();
      startWeekday = startWeekday === 0 ? 7 : startWeekday;

      for (let i = 1; i < startWeekday; i++) {
        const empty = document.createElement("div");
        empty.className = "day-box empty-day";
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const key = formatDate(date);

        const box = document.createElement("div");
        box.className = "day-box";
        box.textContent = day;

        if (data.completedDays[key]) box.classList.add("active");
        if (key === todayKey()) box.classList.add("today");

        grid.appendChild(box);
      }
    }

    function renderHistory() {
      const historyList = document.getElementById("historyList");
      const entries = Object.entries(data.history).sort((a, b) => b[0].localeCompare(a[0]));

      if (entries.length === 0) {
        historyList.innerHTML = `<p class="empty">还没有历史记录。勾选任务或填写总结后会自动保存。</p>`;
        return;
      }

      historyList.innerHTML = "";

      entries.forEach(([date, record]) => {
        const div = document.createElement("div");
        div.className = "history-item";

        const completedText = record.completed.length
          ? record.completed.map(item => `<li>${item}</li>`).join("")
          : "<li>当天没有已完成任务</li>";

        div.innerHTML = `
          <div class="history-date">${date} ${record.completedAllToday ? "✅" : ""}</div>
          <div><strong>完成内容：</strong></div>
          <ul>${completedText}</ul>
          <div><strong>总结：</strong>${record.summary || "无"}</div>
        `;

        historyList.appendChild(div);
      });
    }

    function resetToday() {
      const ok = confirm("确定要重置 Today 任务和今日总结吗？");
      if (!ok) return;

      data.tasks.today.forEach(task => {
        task.done = false;
        syncSameTasks(task.text, false);
      });

      data.summaries[todayKey()] = "";
      data.completedDays[todayKey()] = false;
      saveData();
    }

    document.getElementById("summary").addEventListener("input", () => {
      data.summaries[todayKey()] = document.getElementById("summary").value;
      saveData();
    });

    renderAll();
  </script>
</body>
</html>
